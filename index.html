<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Bridge Bhutan</title>
    <style>
        body, html {
            height: 100%; margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a2a6c; /* If image fails, you'll see deep blue, not gray */
        }

        .main-hero {
            height: 100vh;
            width: 100%;
            /* HIGH-STABILITY IMAGE LINK */
            background-image: linear-gradient(to right, rgba(0,0,0,0.7), rgba(0,0,0,0.2)), 
                              url('https://images.unsplash.com/photo-1548263514-a238825d0963?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 5%;
        }

        /* CREATIVE FLOATING TEXT BLOCK */
        .brand-section {
            color: white;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .brand-section h1 {
            font-size: 3.5rem; margin: 0;
            line-height: 1; font-weight: 900;
        }

        .highlight { color: #f2c94c; } /* Royal Gold */

        /* MODERN LOGIN CARD */
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 360px;
            text-align: center;
        }

        h2 { color: #1a2a6c; margin-bottom: 20px; }
        
        input {
            width: 100%; padding: 14px; margin: 10px 0;
            border-radius: 10px; border: 1px solid #ddd;
            box-sizing: border-box; font-size: 1rem;
        }

        .btn-action {
            width: 100%; padding: 15px; background: #1a2a6c;
            color: white; border: none; border-radius: 10px;
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
            margin-top: 15px;
        }

        .btn-action:hover { background: #f2994a; }

    </style>
</head>
<body>

<div class="main-hero">
    
    <div class="brand-section">
        <h1>BRIDGE<br><span class="highlight">SILENCE.</span></h1>
        <p>AI-Powered Bhutanese Sign Language Translation.</p>
    </div>

    <div class="login-card">
        <h2>Kuzuzangpo</h2>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <a href="translator.html"><button type="button" class="btn-action">Start Translating →</button></a>
        </form>
        <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">Built for the Bhutanese Deaf Community 🇧🇹</p>
    </div>

</div>

</body>
</html>
