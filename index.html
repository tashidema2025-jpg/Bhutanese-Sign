<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Bridge Bhutan</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #1a2a6c; /* Fallback Blue if image fails */
        }

        .bg-image {
            /* This is a very reliable direct link to a Bhutanese mountain landscape */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                              url('https://images.unsplash.com/photo-1548263514-a238825d0963?auto=format&fit=crop&w=1600&q=80');
            
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border-top: 10px solid #f2994a; /* Bhutanese Orange stripe at top */
        }

        h1 { color: #1a2a6c; margin-bottom: 5px; font-size: 2.2rem; }
        p { color: #666; margin-bottom: 25px; }
        
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; 
        }
        
        .btn-login {
            width: 100%; padding: 15px; background: #1a2a6c; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="bg-image">
    <div class="login-card">
        <h1>Kuzuzangpo</h1>
        <p>Sign-Bridge Bhutan</p>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <a href="translator.html"><button type="button" class="btn-login">Login</button></a>
        </form>
    </div>
</div>

</body>
</html>
