<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Bridge Bhutan | Welcome</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* The Background Image from the link you liked */
        .bg-image {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                              url('https://www.nathab.com/uploaded-files/carousels/blog/bhutan/Rinpung-Dzong.jpg');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        /* Semi-transparent Navigation */
        nav { 
            background: rgba(26, 42, 108, 0.7); 
            padding: 20px; 
            display: flex; 
            justify-content: space-around; 
            backdrop-filter: blur(10px);
        }
        nav a { color: white; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
        nav a:hover { color: #f2994a; }

        /* The Centered Login Card */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9); /* "Glass" look */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border-top: 8px solid #f2994a; /* Bhutanese Orange */
        }

        .login-card h1 { color: #1a2a6c; margin-top: 0; font-size: 2rem; }
        .login-card p { color: #444; margin-bottom: 30px; }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }

        .btn-login {
            width: 100%; 
            padding: 15px; 
            background: #1a2a6c; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover { background: #e67e22; transform: translateY(-2px); }

        .footer-text { margin-top: 20px; font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>

<div class="bg-image">
    <nav>
        <a href="index.html">Home</a>
        <a href="#">About BSL</a>
        <a href="#">Contact</a>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <h1>Kuzuzangpo</h1>
            <p>Welcome to Sign-Bridge Bhutan. Please log in to start translating.</p>
            
            <form>
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <a href="translator.html"><button type="button" class="btn-login">Login</button></a>
            </form>
            
            <div class="footer-text">
                Preserving Bhutanese Sign Language through AI
            </div>
        </div>
    </div>
</div>

</body>
</html>
