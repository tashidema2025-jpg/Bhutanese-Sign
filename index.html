<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Mate Bhutan</title>
    <style>
        body, html {
            height: 100%; margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #1a2a6c;
        }

        .main-hero {
            height: 100vh;
            width: 100%;
            /* DIRECT IMAGE LINK TO TIGER'S NEST */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('https://upload.wikimedia.org/wikipedia/commons/b/b7/Paro_Taktsang_August_2013.JPG');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 12px solid #f2994a;
        }

        h1 { 
            color: #1a2a6c; 
            font-size: 2.8rem; 
            margin: 0; 
            font-weight: 800;
        }

        .tagline {
            color: #555;
            font-size: 1.1rem;
            margin: 15px 0 35px 0;
            line-height: 1.5;
            font-style: italic;
        }

        input {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 15px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 1rem;
            background: #f9f9f9;
        }

        .btn-mate {
            width: 100%;
            padding: 18px;
            background: #1a2a6c;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(26, 42, 108, 0.2);
        }

        .btn-mate:hover {
            background: #f2994a;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #1a2a6c;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="main-hero">
    <div class="login-card">
        <h1>Kuzuzangpo</h1>
        <p class="tagline">Because every hand tells a story,<br>and every story deserves to be heard.</p>
        
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <a href="translator.html" style="text-decoration: none;">
                <button type="button" class="btn-mate">Talk with Sign-Mate</button>
            </a>
        </form>

        <div class="footer">
            Sign-Mate Bhutan 🇧🇹
        </div>
    </div>
</div>

</body>
</html>
