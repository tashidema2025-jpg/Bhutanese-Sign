<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Bridge Bhutan | Welcome</title>
    <style>
        /* This covers the whole screen */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Stops scrolling */
        }

        /* THE BACKGROUND IMAGE SECTION */
        .bg-image {
            /* This is the direct link to the Paro Dzong photo you liked */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                              url('https://www.nathab.com/uploaded-files/carousels/blog/bhutan/Rinpung-Dzong.jpg');
            
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* The Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 320px;
            text-align: center;
            border-top: 8px solid #f2994a;
        }

        h1 { color: #1a2a6c; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        
        .btn-login {
            width: 100%; padding: 12px; background: #1a2a6c; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-login:hover { background: #e67e22; }
    </style>
</head>
<body>

<div class="bg-image">
    <div class="login-card">
        <h1>Kuzuzangpo</h1>
        <p>Sign-Bridge Bhutan</p>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <a href="translator.html"><button type="button" class="btn-login">Login</button></a>
        </form>
    </div>
</div>

</body>
</html>
