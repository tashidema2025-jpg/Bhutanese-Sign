<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Mate Bhutan | Kuzuzangpo</title>
    <style>
        body, html {
            height: 100%; margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #1a2a6c;
        }

        .main-hero {
            height: 100vh; width: 100%;
            /* TIGER'S NEST BACKGROUND (DIRECT LINK) */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('https://images.unsplash.com/photo-1623518110543-0219669527e0?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px; border-radius: 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            width: 100%; max-width: 380px;
            text-align: center; border-top: 10px solid #f2994a;
        }

        /* SIGN LANGUAGE GRAPHIC (INNER CARD IMAGE) */
        .bsl-graphic {
            width: 100%; height: 160px;
            background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=1964&auto=format&fit=crop'); 
            background-size: cover; background-position: center;
            border-radius: 20px; margin-bottom: 25px;
            border: 2px solid #f2994a;
        }

        h1 { color: #1a2a6c; font-size: 2.2rem; margin: 0; font-weight: 800; }
        
        .sub-title { color: #1a2a6c; font-weight: 700; margin: 5px 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        .tagline {
            color: #555; font-size: 0.95rem; line-height: 1.5;
            margin: 15px 0 30px 0; font-style: italic;
        }

        input {
            width: 100%; padding: 15px; margin: 8px 0;
            border-radius: 12px; border: 1px solid #ddd;
            box-sizing: border-box; font-size: 1rem;
            background: #fdfdfd;
        }

        .btn-mate {
            width: 100%; padding: 18px; background: #1a2a6c;
            color: white; border: none; border-radius: 12px;
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
            margin-top: 15px; transition: 0.3s;
        }

        .btn-mate:hover { background: #f2994a; transform: scale(1.02); }

        .footer { margin-top: 25px; font-size: 0.8rem; color: #1a2a6c; font-weight: 700; }
    </style>
</head>
<body>

<div class="main-hero">
    <div class="login-card">
        <div class="bsl-graphic"></div>

        <h1>Kuzuzangpo</h1>
        <div class="sub-title">Bhutanese Sign Language Translator</div>
        
        <p class="tagline">
            "Every hand tells a story, and every story deserves to be heard."
        </p>
        
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <a href="translator.html" style="text-decoration: none;">
                <button type="button" class="btn-mate">Talk with Sign-Mate</button>
            </a>
        </form>

        <div class="footer">Sign-Mate Bhutan 🇧🇹</div>
    </div>
</div>

</body>
</html>
