<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sign-Bridge Bhutan</title>
    <style>
        /* Modern Bhutanese-inspired Theme */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f9f9f9; display: flex; flex-direction: column; min-height: 100vh; }
        nav { background: #1a2a6c; color: white; padding: 1rem; display: flex; justify-content: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: bold; }

        .main-container { display: flex; flex: 1; align-items: center; justify-content: center; padding: 20px; }
        
        /* Login Box Styling */
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            border-top: 8px solid #f2994a; /* Bhutanese Orange */
        }

        h1 { color: #1a2a6c; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            box-sizing: border-box; /* Keeps padding inside the box */
        }

        .btn-login { 
            width: 100%; 
            padding: 12px; 
            background: #1a2a6c; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-size: 1rem; 
            cursor: pointer; 
            margin-top: 10px;
        }

        .btn-login:hover { background: #e67e22; }

        .footer-links { margin-top: 20px; font-size: 0.9rem; color: #888; }
        .footer-links a { color: #f2994a; text-decoration: none; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="#">About BSL</a>
</nav>

<div class="main-container">
    <div class="login-card">
        <h1>Kuzuzangpo!</h1>
        <p>Please log in to access the BSL AI Translator.</p>
        
        <form>
            <input type="text" placeholder="Username or Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="footer-links">
            Don't have an account? <a href="#">Sign Up</a> <br><br>
            <a href="#">Forgot password?</a>
        </div>
    </div>
</div>

</body>
</html>
