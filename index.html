<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Mate Bhutan</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

       
        .bg-image {
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                              url('https://images.unsplash.com/photo-1548263514-a238825d0963?q=80&w=2070&auto=format&fit=crop');
            
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85); /* Glass effect */
            backdrop-filter: blur(10px); /* Blurs the mountains behind the box */
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 320px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { color: #1a2a6c; margin: 0; font-size: 2.2rem; }
        p { color: #555; margin-bottom: 25px; font-weight: 500; }
        
        input { 
            width: 100%; padding: 14px; margin: 8px 0; 
            border-radius: 12px; border: 1px solid #ddd; 
            box-sizing: border-box; background: rgba(255,255,255,0.9);
        }
        
        .btn-login {
            width: 100%; padding: 14px; background: #f2994a; /* Bhutanese Orange */
            color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; font-size: 1.1rem;
            margin-top: 15px; box-shadow: 0 4px 15px rgba(242, 153, 74, 0.4);
        }

        .btn-login:hover { background: #1a2a6c; transform: scale(1.02); transition: 0.2s; }
    </style>
</head>
<body>

<div class="bg-image">
    <div class="login-card">
        <h1>Kuzuzangpo</h1>
        <p>Sign-Mate Bhutan</p>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <a href="translator.html"><button type="button" class="btn-login">Login</button></a>
        </form>
    </div>
</div>

</body>
</html>
