<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Mate AI | Live Translator</title>
    <style>
        body {
            margin: 0;
            background-color: #1a2a6c;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .header {
            padding: 20px;
            text-align: center;
        }

        /* The Camera Container */
        .video-container {
            position: relative;
            width: 90%;
            max-width: 700px;
            aspect-ratio: 4/3;
            background: #000;
            border: 5px solid #f2994a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* The AI Prediction Box */
        .output-box {
            margin-top: 30px;
            width: 80%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-bottom: 4px solid #f2994a;
        }

        .translated-text {
            font-size: 2rem;
            font-weight: bold;
            color: #f2994a;
        }

        .status-dot {
            height: 12px;
            width: 12px;
            background-color: #ff4b2b;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .back-btn {
            margin-top: 20px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sign-Mate Live AI</h1>
        <p><span class="status-dot"></span> System: Ready for BSL Input</p>
    </div>

    <div class="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div class="output-box">
        <p style="margin:0; font-size: 0.8rem; text-transform: uppercase;">Translated Meaning:</p>
        <div class="translated-text" id="prediction">Waiting for signs...</div>
    </div>

    <a href="index.html" class="back-btn">← Logout / Return Home</a>

    <script>
        // SCRIPT TO ACTIVATE THE CAMERA
        const video = document.getElementById('webcam');

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing camera: ", err);
                alert("Please allow camera access to use the translator.");
            }
        }

        // Start camera when page loads
        setupCamera();
    </script>

</body>
</html>
